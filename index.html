<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080f1e;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}

/* HEADER */
.header{background:linear-gradient(135deg,#0f172a,#1e1b4b);border-bottom:1px solid #1e293b;

.header-inner{max-width:680px;margin:0 auto;padding:13px 16px}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.title-label{font-size:10px;letter-spacing:3px;color:#6366f1;font-weight:700;text-transform:uppercase}
.title-main{font-size:20px;font-weight:900;background:linear-gradient(90deg,#a5b4fc,#67e8f9);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.exam-pill{border-radius:14px;padding:6px 14px;text-align:center;min-width:68px}
.exam-num{font-size:22px;font-weight:900;line-height:1}
.exam-lbl{font-size:9px;letter-spacing:1px;font-weight:600}

/* PROGRESS */
.prog-row{display:flex;justify-content:space-between;font-size:10px;color:#64748b;margin-bottom:4px}
.prog-bar-bg{height:7px;background:#1e293b;border-radius:4px;overflow:hidden;margin-bottom:10px}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,#6366f1,#22c55e);border-radius:4px;
  transition:width .5s;box-shadow:0 0 8px #6366f166}

/* TABS */
.tabs{display:flex;gap:6px}
.tab-btn{flex:1;padding:6px 0;border-radius:8px;border:none;font-size:11px;font-weight:700;
  transition:all .2s}
.tab-active{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;box-shadow:0 2px 8px #6366f144}
.tab-inactive{background:#1e293b;color:#64748b}

/* WRAP */
.wrap{max-width:680px;margin:0 auto;padding:14px 14px 60px}

/* MOTIVATION */
.motiv{background:linear-gradient(90deg,#1e1b4b,#0f172a);border:1px solid #312e81;
  border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#a5b4fc;font-style:italic}

/* DAY STRIP */
.day-strip{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px;scrollbar-width:none}
.day-strip::-webkit-scrollbar{display:none}
.day-btn{min-width:58px;padding:8px 6px;border-radius:12px;border:2px solid transparent;
  text-align:center;position:relative;transition:all .18s;background:#0f172a}
.day-btn.active{border-color:#6366f1;background:#1e293b;box-shadow:0 0 14px #6366f155}
.day-btn.today{border-color:#22c55e44;background:#1e1b4b}
.day-btn.past{background:#080f1e}
.day-date{font-size:11px;font-weight:700;color:#94a3b8}
.day-date.today-c{color:#a5b4fc}
.day-date.past-c{color:#334155}
.day-name{font-size:9px;color:#475569;margin-top:2px}
.today-badge{margin-top:3px;background:#22c55e;color:#fff;border-radius:4px;
  font-size:8px;padding:1px 4px;font-weight:700;display:inline-block}
.done-dot{position:absolute;top:-4px;right:-4px;width:14px;height:14px;border-radius:50%;
  background:#22c55e;font-size:8px;color:#fff;display:flex;align-items:center;justify-content:center}

/* DAY CARD */
.day-card{border-radius:18px;overflow:hidden;margin-bottom:12px}
.day-card-hdr{padding:14px 16px;border-bottom:1px solid #1e293b}
.day-card-hdr.today-hdr{background:linear-gradient(135deg,#1e1b4b,#312e81)}
.day-card-hdr.holiday-hdr{background:#0f172a}
.day-card-hdr.normal-hdr{background:#080f1e}
.day-title{font-size:17px;font-weight:800;color:#f1f5f9}
.day-meta{display:flex;flex-wrap:wrap;gap:8px;font-size:10px;color:#64748b;margin-top:4px}
.day-note{font-size:12px;color:#fbbf24;margin-top:5px;font-weight:700}

/* RING */
.ring-wrap{flex-shrink:0}
.ring{border-radius:50%;display:flex;align-items:center;justify-content:center}
.ring-inner{border-radius:50%;background:#080f1e;display:flex;align-items:center;justify-content:center}
.ring-text{font-size:11px;font-weight:900;color:#22c55e}

/* NAMAAZ */
.namaaz-toggle{width:100%;padding:8px 16px;background:#080f1e;border:none;
  border-bottom:1px solid #1e293b;color:#475569;font-size:11px;
  display:flex;justify-content:space-between;align-items:center}
.namaaz-grid{display:flex;gap:8px;padding:10px 14px;background:#080f1e;

.namaaz-item{background:#0f172a;border:1px solid #1e293b;border-radius:8px;

.namaaz-icon{font-size:14px}
.namaaz-name{font-size:10px;font-weight:700;color:#a5b4fc}
.namaaz-time{font-size:9px;color:#64748b}

.session-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:9px;transition:opacity .3s}
.session-row.done{opacity:.42}
.chk-btn{width:26px;height:26px;border-radius:50%;flex-shrink:0;margin-top:10px;
  border:2px solid #334155;background:transparent;
  display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;transition:all .25s}

.chk-btn.current{border-color:#f59e0b;box-shadow:0 0 8px #f59e0b77}
.chk-placeholder{width:26px;flex-shrink:0;margin-top:10px}
.sess-card{flex:1;border-radius:12px;padding:10px 13px;transition:all .25s}
.sess-card.private{background:#080f1e;border:1.5px solid #1e293b}
.sess-card.current{box-shadow:0 0 14px #f59e0b22}
.sess-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.sess-left{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.sess-icon{font-size:15px}
.sess-subj{font-size:12px;font-weight:800}
.badge{border-radius:5px;padding:1px 6px;font-size:9px;font-weight:700}
.badge-now{background:#f59e0b;color:#000}
.badge-rev{background:#7c3aed;color:#fff}
.badge-new{background:#065f46;color:#6ee7b7}

.time-txt{font-size:10px;color:#94a3b8;font-weight:700;white-space:nowrap}
.time-sep{font-size:8px;color:#334155}
.sess-topic{font-size:12px;color:#94a3b8;line-height:1.5}
.sess-topic.done-txt{text-decoration:line-through}
.sess-topic.private-txt{color:#334155}

.done-banner{text-align:center;padding:14px;background:linear-gradient(135deg,#065f46,#064e3b);

.done-banner-title{font-size:13px;font-weight:800;color:#6ee7b7}
.done-banner-sub{font-size:11px;color:#34d399;margin-top:3px}

.nav-row{display:flex;gap:10px}

.syllabus-name{font-size:12px;font-weight:700;color:#cbd5e1}

</head>

  "ইসলাম শিক্ষা":"#14b8a6","ইসলাম + ভূগোল":"#14b8a6","ইংরেজি প্রাইভেট":"#475569",
  "সব বিষয়":"#eab308","প্রস্তুতি":"#f97316"
};
function dotColor(s){return DOT_COLORS[s]||"#94a3b8";}

const BN=["০","১","২","৩","৪","৫","৬","৭","৮","৯"];
function bn(n){return String(n).split("").map(d=>BN[+d]||d).join("");}
function fmt(h,m){
  let L;
  if(h>=4&&h<6)L="ভোর"; else if(h>=6&&h<12)L="সকাল";
  else if(h>=12&&h<15)L="দুপুর"; else if(h>=15&&h<17)L="বিকাল";
  else if(h>=17&&h<19)L="সন্ধ্যা"; else L="রাত";
  const h12=h%12===0?12:h%12;
  return L+" "+bn(h12)+(m?":"+bn(m):"")+"টা";
}

const MONTHS=["জানু","ফেব্রু","মার্চ","এপ্রিল","মে","জুন","জুলাই","আগস্ট","সেপ্টে","অক্টো","নভে","ডিসে"];
function shortDate(d){const x=new Date(d);return bn(x.getDate())+" "+MONTHS[x.getMonth()];}

function isToday(d){return new Date().toDateString()===new Date(d).toDateString();}
function isPast(d){const t=new Date();t.setHours(0,0,0,0);return new Date(d)<t;}
function daysLeft(){const t=new Date();t.setHours(0,0,0,0);return Math.ceil((EXAM_DATE-t)/86400000);}

function curSi(di){
  const now=new Date();
  if(PLAN[di].date!==now.toISOString().split("T")[0])return -1;
  const nm=now.getHours()*60+now.getMinutes();
  return PLAN[di].sessions.findIndex(s=>nm>=s.sH*60+s.sM&&nm<s.eH*60+s.eM);
}

// STATE
let done={};
let activeDay=0;
let currentView="daily";
let showNamaaz=false;

function loadDone(){try{done=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");}catch{done={};}}
function saveDone(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(done));}catch{}}

function totalSessions(){return PLAN.reduce((a,d)=>a+d.sessions.filter(s=>s.type!=="private").length,0);}
function doneCount(){return Object.values(done).filter(Boolean).length;}

function updateProgress(){
  const tot=totalSessions(),dn=doneCount(),pct=Math.round((dn/tot)*100);
  document.getElementById("progTxt").textContent=dn+"/"+tot+" • "+pct+"%";
  document.getElementById("progFill").style.width=pct+"%";
}

function updateExamPill(){
  const dl=daysLeft();
  const c=dl<=2?"#ef4444":dl<=4?"#f59e0b":"#22c55e";
  const pill=document.getElementById("examPill");
  pill.style.background=c+"22";
  pill.style.border="1.5px solid "+c;
  const num=document.getElementById("examNum");
  num.textContent=dl;
  num.style.color=c;
}

function setView(v){
  currentView=v;
  ["daily","overview","stats"].forEach(x=>{
    document.getElementById("view"+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle("hidden",x!==v);
  });
  document.querySelectorAll(".tab-btn").forEach((b,i)=>{
    const views=["daily","overview","stats"];
    b.className="tab-btn "+(views[i]===v?"tab-active":"tab-inactive");
  });
  if(v==="overview")renderOverview();
  if(v==="stats")renderStats();
}

function changeDay(dir){
  const next=activeDay+dir;
  if(next<0||next>=PLAN.length)return;
  activeDay=next;
  renderDayStrip();
  renderDayCard();
}

function toggleSession(di,si){
  const k=di+"-"+si;
  done[k]=!done[k];
  saveDone();
  updateProgress();
  renderDayStrip();
  renderDayCard();
}

function toggleNamaaz(){
  showNamaaz=!showNamaaz;
  const el=document.getElementById("namaazPanel");
  if(el)el.classList.toggle("hidden",!showNamaaz);
  const btn=document.getElementById("namaazToggleBtn");
  if(btn)btn.querySelector("span:last-child").textContent=showNamaaz?"▲ লুকাও":"▼ দেখাও";
}

// ── RENDER DAY STRIP ──
function renderDayStrip(){
  const strip=document.getElementById("dayStrip");
  strip.innerHTML="";
  PLAN.forEach((d,i)=>{
    const today=isToday(d.date),past=isPast(d.date),act=activeDay===i;
    const allDone=d.sessions.filter(s=>s.type!=="private").every((_,si)=>done[i+"-"+si]);
    const btn=document.createElement("button");
    btn.className="day-btn"+(act?" active":"")+(today?" today":"")+(past?" past":"");
    btn.onclick=()=>{activeDay=i;renderDayStrip();renderDayCard();};
    let html="";
    if(allDone)html+='<div class="done-dot">✓</div>';
    if(d.holiday)html+='<div style="font-size:8px;margin-bottom:1px">🏖️</div>';
    html+='<div class="day-date'+(today?" today-c":past?" past-c":"")+'">'+shortDate(d.date)+'</div>';
    html+='<div class="day-name">'+d.day.slice(0,5)+'</div>';
    if(today)html+='<div class="today-badge">আজ</div>';
    btn.innerHTML=html;
    strip.appendChild(btn);
  });
}

   ["ইতিহাস","১ম–৪র্থ অধ্যায়","#ef4444"],
   ["ইসলাম শিক্ষা","১ম–২য় অধ্যায়","#14b8a6"],
   ["ভূগোল","১ম–৫ম অধ্যায়","#a855f7"],
   ["অর্থনীতি","১ম–৩য় অধ্যায়","#ec4899"],
  ].forEach(([s,d,c])=>{
    html+='<div class="syllabus-item"><div class="syllabus-dot" style="background:'+c+'"></div>';
    html+='<div><div class="syllabus-name">'+s+'</div><div class="syllabus-detail">'+d+'</div></div></div>';
  });
  html+='</div>';

  document.getElementById("viewStats").innerHTML=html;
}

// ── INIT ──
function init(){
  loadDone();
  // Set today as active day
  const ti=PLAN.findIndex(d=>isToday(d.date));
  activeDay=ti>=0?ti:0;
  // Motivation
  document.getElementById("motivDiv").textContent="💬 "+MOTIVS[Math.floor(Math.random()*MOTIVS.length)];
  updateExamPill();
  updateProgress();
  renderDayStrip();
  renderDayCard();
  // Refresh every minute for "current session"
  setInterval(()=>{if(currentView==="daily")renderDayCard();},60000);
}

init();
</script>

function dot(s){return DOT[s]||"#94a3b8";}

const BN=["০","১","২","৩","৪","৫","৬","৭","৮","৯"];
function bn(n){return String(n).split("").map(d=>BN[+d]??d).join("");}
function fmt(h,m){
  let L="রাত";
  if(h>=4&&h<6)L="ভোর"; else if(h>=6&&h<12)L="সকাল";
  else if(h>=12&&h<15)L="দুপুর"; else if(h>=15&&h<17)L="বিকাল";
  else if(h>=17&&h<19)L="সন্ধ্যা"; else L="রাত";
  const h12=h%12===0?12:h%12;
  return `${L} ${bn(h12)}${m?`:${bn(m)}`:""}টা`;
}
function fmtR(s){return `${fmt(s.sH,s.sM)} – ${fmt(s.eH,s.eM)}`;}

function daysLeft(){
  const t=new Date();t.setHours(0,0,0,0);
  return Math.ceil((EXAM_DATE-t)/86400000);
}
function isToday(d){return new Date().toDateString()===new Date(d).toDateString();}
function isPast(d){const t=new Date();t.setHours(0,0,0,0);return new Date(d)<t;}
function shortDate(d){
  const x=new Date(d);
  const M=["জানু","ফেব্রু","মার্চ","এপ্রিল","মে","জুন","জুলাই","আগস্ট","সেপ্টে","অক্টো","নভে","ডিসে"];
  return `${bn(x.getDate())} ${M[x.getMonth()]}`;
}
function curSi(dayIdx){
  const now=new Date();
  if(studyPlan[dayIdx]?.date!==now.toISOString().split("T")[0])return -1;
  const nm=now.getHours()*60+now.getMinutes();
  return studyPlan[dayIdx].sessions.findIndex(s=>{
    const st=s.sH*60+s.sM, en=s.eH*60+s.eM;
    return nm>=st&&nm<en;
  });
}

            <div style={{fontSize:10,letterSpacing:3,color:"#6366f1",fontWeight:700}}>৯ম শ্রেণি • মানবিক বিভাগ</div>
            <div style={{fontSize:20,fontWeight:900,background:"linear-gradient(90deg,#a5b4fc,#67e8f9)",
              WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>স্টাডি প্ল্যান ২০২৬</div>
          </div>
          <div style={{background:`${examC}22`,border:`1.5px solid ${examC}`,borderRadius:14,
            padding:"6px 14px",textAlign:"center",minWidth:68}}>
            <div style={{fontSize:22,fontWeight:900,color:examC,lineHeight:1}}>{dl}</div>
            <div style={{fontSize:9,color:examC,letterSpacing:1,fontWeight:600}}>দিন বাকি</div>
          </div>
        </div>
        {/* Progress */}
        <div style={{marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#64748b",marginBottom:4}}>
            <span>সামগ্রিক অগ্রগতি</span>
            <span style={{color:"#94a3b8"}}>{doneN}/{total} • {pct}%</span>
          </div>
          <div style={{height:7,background:"#1e293b",borderRadius:4,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pct}%`,background:"linear-gradient(90deg,#6366f1,#22c55e)",
              borderRadius:4,transition:"width .5s",boxShadow:"0 0 8px #6366f166"}}/>
          </div>
        </div>
        {/* Tabs */}
        <div style={{display:"flex",gap:6}}>
          {[["daily","📅 দৈনিক"],["overview","📋 সম্পূর্ণ"],["stats","📊 পরিসংখ্যান"]].map(([v,l])=>(
            <button key={v} onClick={()=>setView(v)} style={S.tab(v)}>{l}</button>
          ))}
        </div>
      </div></div>

      <div style={S.wrap}>
        {/* Motivation */}
        <div style={{background:"linear-gradient(90deg,#1e1b4b,#0f172a)",border:"1px solid #312e81",
          borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#a5b4fc",fontStyle:"italic"}}>
          💬 {MOTIV[mIdx]}
        </div>

        {/* ══ DAILY ══ */}
        {view==="daily" && <>
          {/* Day strip */}
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:14,scrollbarWidth:"none"}}>
            {studyPlan.map((d,i)=>{
              const today=isToday(d.date),past=isPast(d.date),act=aDay===i;
              const allDone=d.sessions.filter(s=>s.type!=="private").every((_,si)=>done[`${i}-${si}`]);
              return(
                <button key={i} onClick={()=>setADay(i)} style={S.dayBtn(i)}>
                  {allDone&&<div style={{position:"absolute",top:-4,right:-4,width:14,height:14,
                    borderRadius:"50%",background:"#22c55e",fontSize:8,color:"#fff",
                    display:"flex",alignItems:"center",justifyContent:"center"}}>✓</div>}
                  {d.isHoliday&&<div style={{fontSize:8,marginBottom:1}}>🏖️</div>}
                  <div style={{fontSize:11,fontWeight:700,color:today?"#a5b4fc":past?"#334155":"#94a3b8"}}>{shortDate(d.date)}</div>
                  <div style={{fontSize:9,color:today?"#818cf8":"#475569",marginTop:2}}>{d.day.slice(0,5)}</div>
                  {today&&<div style={{marginTop:3,background:"#22c55e",color:"#fff",
                    borderRadius:4,fontSize:8,padding:"1px 4px",fontWeight:700}}>আজ</div>}
                </button>
              );
            })}
          </div>

          {/* Day card */}
          <div style={{background:"#0d1526",border:isToday(day.date)?"1px solid #4338ca":"1px solid #1e293b",
            borderRadius:18,overflow:"hidden",boxShadow:isToday(day.date)?"0 0 28px #6366f122":"none"}}>

            {/* Card header */}
            <div style={{padding:"14px 16px",
              background:isToday(day.date)?"linear-gradient(135deg,#1e1b4b,#312e81)":day.isHoliday?"#0f172a":"#080f1e",
              borderBottom:"1px solid #1e293b"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:17,fontWeight:800,color:"#f1f5f9"}}>{shortDate(day.date)} — {day.day}</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:8,fontSize:10,color:"#64748b",marginTop:4}}>
                    {day.isSchool&&<span>🏫 স্কুল: সকাল ৮টা – দুপুর ২টা</span>}
                    {day.isHoliday&&<span style={{color:"#fbbf24"}}>🏖️ ছুটির দিন</span>}
                    {day.hasEngPrivate&&<span style={{color:"#60a5fa"}}>📚 ইং প্রাইভেট: বিকাল ৩–৪টা</span>}
                    <span style={{color:"#a78bfa"}}>📘 বাং/গণিত প্রাইভেট: বিকাল ৫–সন্ধ্যা ৬:৩০</span>
                  </div>
                  {day.note&&<div style={{fontSize:12,color:"#fbbf24",marginTop:5,fontWeight:700}}>{day.note}</div>}
                </div>
                {/* Ring */}
                <div style={{flexShrink:0}}>
                  <div style={{width:46,height:46,borderRadius:"50%",flexShrink:0,
                    background:`conic-gradient(#22c55e ${dayDoneN/dayTot*360}deg,#1e293b 0)`,
                    display:"flex",alignItems:"center",justifyContent:"center",
                    boxShadow:"0 0 12px #22c55e33"}}>
                    <div style={{width:35,height:35,borderRadius:"50%",background:"#080f1e",
                      display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <span style={{fontSize:11,fontWeight:900,color:"#22c55e"}}>{dayDoneN}/{dayTot}</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            {/* Namaaz toggle */}
            <button onClick={()=>setShowN(p=>!p)} style={{width:"100%",padding:"8px 16px",
              background:"#080f1e",border:"none",borderBottom:"1px solid #1e293b",
              color:"#475569",fontSize:11,cursor:"pointer",
              display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span>🕌 নামাজের সময়সূচি</span>
              <span style={{fontSize:9}}>{showN?"▲ লুকাও":"▼ দেখাও"}</span>
            </button>
            {showN&&(
              <div style={{display:"flex",gap:8,padding:"10px 14px",background:"#080f1e",
                borderBottom:"1px solid #1e293b",flexWrap:"wrap"}}>
                {NAMAAZ.map(n=>(
                  <div key={n.n} style={{background:"#0f172a",border:"1px solid #1e293b",
                    borderRadius:8,padding:"6px 10px",textAlign:"center",minWidth:70}}>
                    <div style={{fontSize:14}}>{n.i}</div>
                    <div style={{fontSize:10,fontWeight:700,color:"#a5b4fc"}}>{n.n}</div>
                    <div style={{fontSize:9,color:"#64748b"}}>{n.t}</div>
                  </div>
                ))}
              </div>
            )}

            {/* Sessions */}
            <div style={{padding:"12px"}}>
              {day.sessions.map((ses,si)=>{
                const k=`${aDay}-${si}`;
                const isDone=done[k];
                const isPriv=ses.type==="private";
                const isRev=ses.type==="revision";
                const isCur=csi===si;
                const isJust=just===k;
                const d2=dot(ses.subject);
                return(
                  <div key={si} style={{display:"flex",alignItems:"flex-start",gap:10,
                    marginBottom:9,opacity:isDone?0.42:1,transition:"opacity .3s"}}>

                    {/* Checkbox */}
                    {!isPriv?(
                      <button onClick={()=>toggle(aDay,si)} style={{
                        width:26,height:26,borderRadius:"50%",flexShrink:0,marginTop:10,
                        border:`2px solid ${isDone?"#22c55e":isCur?"#f59e0b":"#334155"}`,
                        background:isDone?"#22c55e":"transparent",
                        cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
                        fontSize:13,color:"#fff",transition:"all .25s",
                        boxShadow:isDone?"0 0 8px #22c55e77":isCur?"0 0 8px #f59e0b77":"none",
                        transform:isJust?"scale(1.35)":"scale(1)"}}>
                        {isDone?"✓":""}
                      </button>
                    ):(
                      <div style={{width:26,flexShrink:0,marginTop:10}}/>
                    )}

                    {/* Card */}
                    <div style={{flex:1,
                      background:isPriv?"#080f1e":isCur?"#1a1a2e":"#111827",
                      border:`1.5px solid ${isPriv?"#1e293b":isCur?"#f59e0b88":d2+"44"}`,
                      borderLeft:isPriv?undefined:`3px solid ${d2}`,
                      borderRadius:12,padding:"10px 13px",
                      boxShadow:isCur?"0 0 14px #f59e0b22":"none"}}>

                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:5}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                          <span style={{fontSize:15}}>{ses.icon}</span>
                          <span style={{fontSize:12,fontWeight:800,color:isPriv?"#475569":d2}}>{ses.subject}</span>
                          {isCur&&!isDone&&<span style={{background:"#f59e0b",color:"#000",
                            borderRadius:5,padding:"1px 6px",fontSize:9,fontWeight:800}}>🔴 এখন</span>}
                          {isRev&&<span style={{background:"#7c3aed",color:"#fff",
                            borderRadius:5,padding:"1px 6px",fontSize:9,fontWeight:700}}>🔁 রিভিশন</span>}
                          {ses.type==="new"&&<span style={{background:"#065f46",color:"#6ee7b7",
                            borderRadius:5,padding:"1px 6px",fontSize:9,fontWeight:700}}>নতুন</span>}
                        </div>

                        {/* ✅ Bengali 12-hr time box */}
                        <div style={{background:"#0b1120",borderRadius:8,padding:"4px 9px",
                          border:"1px solid #1e293b",flexShrink:0,marginLeft:6,textAlign:"center"}}>
                          <div style={{fontSize:10,color:"#94a3b8",fontWeight:700,whiteSpace:"nowrap"}}>{fmt(ses.sH,ses.sM)}</div>
                          <div style={{fontSize:8,color:"#334155"}}>↓</div>
                          <div style={{fontSize:10,color:"#94a3b8",fontWeight:700,whiteSpace:"nowrap"}}>{fmt(ses.eH,ses.eM)}</div>
                        </div>
                      </div>

                      <div style={{fontSize:12,color:isPriv?"#334155":"#94a3b8",lineHeight:1.5,
                        textDecoration:isDone?"line-through":"none"}}>
                        {ses.topic}
                      </div>
                    </div>
                  </div>
                );
              })}

              {/* All done banner */}
              {dayDoneN===dayTot&&dayTot>0&&(
                <div style={{textAlign:"center",padding:"14px",
                  background:"linear-gradient(135deg,#065f46,#064e3b)",
                  borderRadius:12,border:"1px solid #22c55e44",boxShadow:"0 0 20px #22c55e22"}}>
                  <div style={{fontSize:24}}>🎉</div>
                  <div style={{fontSize:13,fontWeight:800,color:"#6ee7b7"}}>আজকের সব পড়া শেষ!</div>
                  <div style={{fontSize:11,color:"#34d399",marginTop:3}}>অসাধারণ! তুমি দারুণ করছ।</div>
                </div>
              )}
            </div>
          </div>

          {/* Prev/Next */}
          <div style={{display:"flex",gap:10,marginTop:12}}>
            {[["← আগের দিন",Math.max(0,aDay-1),aDay===0],
              ["পরের দিন →",Math.min(studyPlan.length-1,aDay+1),aDay===studyPlan.length-1]
            ].map(([label,target,disabled])=>(
              <button key={label} onClick={()=>!disabled&&setADay(target)} style={{
                flex:1,padding:"11px",borderRadius:12,
                background:disabled?"#080f1e":"#1e293b",
                border:`1px solid ${disabled?"#0f172a":"#334155"}`,
                color:disabled?"#1e293b":"#94a3b8",
                cursor:disabled?"not-allowed":"pointer",fontSize:12,fontWeight:600}}>
                {label}
              </button>
            ))}
          </div>
        </>}

        {/* ══ OVERVIEW ══ */}
        {view==="overview" && <>
          {studyPlan.map((d,i)=>(
            <div key={i} style={{background:isToday(d.date)?"#1e1b4b":"#0d1526",
              border:isToday(d.date)?"1.5px solid #6366f1":"1px solid #1e293b",
              borderRadius:14,marginBottom:10,overflow:"hidden",
              boxShadow:isToday(d.date)?"0 0 20px #6366f122":"none"}}>
              <div style={{padding:"10px 14px",
                background:isToday(d.date)?"linear-gradient(90deg,#1e1b4b,#312e81)":"#080f1e",
                display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <span style={{fontWeight:800,fontSize:13,color:"#e2e8f0"}}>{shortDate(d.date)} — {d.day}</span>
                  {d.isHoliday&&<span style={{fontSize:10,color:"#fbbf24",marginLeft:8}}>🏖️ ছুটি</span>}
                  {d.note&&<span style={{fontSize:10,color:"#fbbf24",marginLeft:8}}>{d.note}</span>}
                  {isToday(d.date)&&<span style={{fontSize:10,color:"#a5b4fc",marginLeft:8,fontWeight:700}}>← আজ</span>}
                </div>
                <button onClick={()=>{setADay(i);setView("daily");}} style={{
                  background:"#6366f1",color:"#fff",border:"none",
                  borderRadius:7,padding:"4px 11px",fontSize:11,cursor:"pointer",fontWeight:700}}>
                  বিস্তারিত
                </button>
              </div>
              <div style={{padding:"10px 12px",display:"flex",flexWrap:"wrap",gap:6}}>
                {d.sessions.map((s,si)=>{
                  const d2=dot(s.subject), isDone=done[`${i}-${si}`];
                  return(
                    <div key={si} style={{background:"#080f1e",
                      border:`1px solid ${s.type==="private"?"#1e293b":d2+"55"}`,
                      borderLeft:s.type!=="private"?`2px solid ${d2}`:undefined,
                      borderRadius:7,padding:"3px 9px",
                      fontSize:10,color:s.type==="private"?"#334155":d2,fontWeight:700,
                      textDecoration:isDone?"line-through":"none",opacity:isDone?0.4:1}}>
                      {s.icon} {s.subject} {s.type==="revision"?"🔁":""}
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </>}

        {/* ══ STATS ══ */}
        {view==="stats" && <>
          <div style={{background:"#0d1526",border:"1px solid #1e293b",borderRadius:16,
            padding:"20px",marginBottom:14,textAlign:"center"}}>
            <div style={{fontSize:11,color:"#64748b",marginBottom:8,letterSpacing:1}}>সামগ্রিক অগ্রগতি</div>
            <div style={{width:110,height:110,borderRadius:"50%",margin:"0 auto 12px",
              background:`conic-gradient(#6366f1 ${pct*3.6}deg,#1e293b 0)`,
              display:"flex",alignItems:"center",justifyContent:"center",
              boxShadow:"0 0 24px #6366f133"}}>
              <div style={{width:84,height:84,borderRadius:"50%",background:"#080f1e",
                display:"flex",alignItems:"center",justifyContent:"center"}}>
                <span style={{fontSize:26,fontWeight:900,color:"#a5b4fc"}}>{pct}%</span>
              </div>
            </div>
            <div style={{fontSize:13,color:"#94a3b8"}}>{doneN} সেশন শেষ, {total-doneN} টি বাকি</div>
          </div>

          <div style={{background:"#0d1526",border:"1px solid #1e293b",borderRadius:14,padding:"14px",marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:800,color:"#94a3b8",marginBottom:12}}>📚 বিষয়ভিত্তিক মোট সময়</div>
            {[["গণিত",8,"#f59e0b","⭐ দুর্বল"],["ইতিহাস",6,"#ef4444","⭐ দুর্বল"],
              ["বাংলা ১ম",5,"#22c55e","💪 শক্তিশালী"],["ইংরেজি",4,"#6366f1",""],
              ["ভূগোল",4,"#a855f7",""],["বাংলা ২য়",3,"#10b981",""],
              ["অর্থনীতি",3,"#ec4899",""],["ইসলাম শিক্ষা",2,"#14b8a6",""]
            ].map(([subj,hrs,color,tag])=>(
              <div key={subj} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:4}}>
                  <span style={{color:"#cbd5e1",fontWeight:600}}>{subj}
                    {tag&&<span style={{fontSize:9,color,background:color+"22",borderRadius:4,
                      padding:"1px 5px",marginLeft:6}}>{tag}</span>}
                  </span>
                  <span style={{color:"#64748b"}}>~{hrs} ঘণ্টা</span>
                </div>
                <div style={{height:6,background:"#1e293b",borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${(hrs/8)*100}%`,background:color,
                    borderRadius:3,boxShadow:`0 0 6px ${color}66`}}/>
                </div>
              </div>
            ))}
          </div>

          <div style={{background:"#0d1526",border:"1px solid #1e293b",borderRadius:14,padding:"14px"}}>
            <div style={{fontSize:12,fontWeight:800,color:"#94a3b8",marginBottom:10}}>✅ সিলেবাস চেকলিস্ট</div>
            {[["বাংলা ১ম","গদ্য ৬টি + পদ্য ৭টি + সহপাঠ ২টি","#22c55e"],
              ["বাংলা ২য়","পরিচ্ছেদ ১-১৬ + রচনামূলক সব","#10b981"],
              ["ইংরেজি ১ম","Unit 1,2,3,4,11 + Story + Dialogue","#6366f1"],
              ["ইংরেজি ২য়","৯টি গ্রামার টপিক + Email","#818cf8"],
              ["গণিত","বীজগণিত ৫ + জ্যামিতি ২ + ত্রিকোণমিতি + পরিমিতি + পরিসংখ্যান","#f59e0b"],
              ["ইতিহাস","১ম–৪র্থ অধ্যায়","#ef4444"],
              ["ইসলাম শিক্ষা","১ম–২য় অধ্যায়","#14b8a6"],
              ["ভূগোল","১ম–৫ম অধ্যায়","#a855f7"],
              ["অর্থনীতি","১ম–৩য় অধ্যায়","#ec4899"],
            ].map(([subj,detail,color])=>(
              <div key={subj} style={{display:"flex",gap:10,marginBottom:9,alignItems:"flex-start"}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:color,flexShrink:0,marginTop:4}}/>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:"#cbd5e1"}}>{subj}</div>
                  <div style={{fontSize:10,color:"#475569"}}>{detail}</div>
                </div>
              </div>
            ))}
          </div>
        </>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
